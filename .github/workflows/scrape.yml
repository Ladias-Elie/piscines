name: Scrape fréquentation piscines

on:
  schedule:
    # Décalé des marques rondes (:00/:15/:30/:45) pour éviter la contention
    # documentée par GitHub sur les crons alignés au quart d'heure.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-piscines
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le scraper
        run: python scripts/scrape.py

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter."
          else
            git commit -m "Mise à jour fréquentation piscines"
            git push
          fi
