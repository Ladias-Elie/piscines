<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Piscines Lyon — Fréquentation en direct</title>
<meta name="description" content="Fréquentation en temps réel des piscines d'été de Lyon : CNTB, Vaise, Duchère, Mermoz.">
<meta name="theme-color" content="#1f6fb2">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #f5efe1;
    --ink: #12213b;
    --ink-soft: #55607a;
    --ink-faint: #8891a3;
    --card-bg: #ffffff;
    --pool: #1f6fb2;
    --sun: #eab13a;
    --vert: #2f8f5b;
    --orange: #d97a34;
    --rouge: #c74634;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 2rem;
  }

  header {
    position: relative;
    padding: 2.1rem 1.25rem 1.1rem;
    text-align: center;
    overflow: hidden;
  }

  .deco-sun {
    position: absolute;
    top: -70px;
    right: -60px;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: var(--sun);
    z-index: 0;
  }

  header .kicker,
  header h1,
  header p {
    position: relative;
    z-index: 1;
  }

  .kicker {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--pool);
    font-weight: 800;
  }

  header h1 {
    margin: 0.4rem 0 0;
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  header p {
    margin: 0.45rem 0 0;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .wave-divider {
    display: block;
    width: 100%;
    height: 18px;
    margin-bottom: 0.5rem;
  }

  .wave-divider svg { display: block; width: 100%; height: 100%; }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 1rem;
  }

  .featured {
    background: var(--card-bg);
    border: 2.5px solid var(--ink);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.25rem 1.5rem;
    box-shadow: 7px 7px 0 var(--ink);
    text-align: center;
  }

  .featured h2 {
    margin: 0 0 0.5rem;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .nombre {
    font-size: 3.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .nombre-label {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin-top: 0.4rem;
    margin-bottom: 1.35rem;
  }

  .courbe-wrap {
    width: 100%;
    text-align: left;
  }

  .courbe {
    display: block;
    width: 100%;
  }

  .point-hit { cursor: pointer; }

  .axe-label {
    font-size: 7.5px;
    font-weight: 700;
    fill: var(--ink-faint);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .courbe-legende {
    display: flex;
    flex-wrap: wrap;
    gap: 0.2rem 1rem;
    font-size: 0.68rem;
    color: var(--ink-soft);
    font-weight: 600;
    margin-top: 0.6rem;
  }

  .legende-item {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }

  .legende-trait {
    display: inline-block;
    width: 16px;
    height: 0;
    border-top: 2px solid #1f6fb2;
  }

  .legende-trait--max {
    border-top: 2px dashed var(--ink-faint);
  }

  .legende-trait--moyenne {
    border-top: 2px solid #eab13a;
  }

  section.autres {
    margin-top: 1.75rem;
  }

  section.autres h3 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 800;
    margin: 0 0 0.7rem 0.25rem;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.85rem;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: var(--radius-md);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .card:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .card .nom {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--ink);
  }

  .card .nombre-carte {
    font-size: 1.7rem;
    font-weight: 800;
    line-height: 1;
  }

  .card .nombre-carte-unite {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--ink-soft);
    margin-left: 0.3rem;
  }

  footer.maj {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    text-align: center;
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--vert);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; }
  }

  .erreur {
    text-align: center;
    color: var(--rouge);
    font-weight: 700;
    font-size: 0.85rem;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: #f7ddd7;
    border: 2px solid var(--rouge);
    border-radius: var(--radius-sm);
  }

  .point-tooltip {
    position: fixed;
    z-index: 50;
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 0.65rem 0.9rem 0.6rem;
    min-width: 136px;
    box-shadow: 4px 4px 0 var(--ink);
  }

  .point-tooltip[hidden] { display: none; }

  .point-tooltip-close {
    position: absolute;
    top: 2px;
    right: 4px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 1rem;
    line-height: 1;
    font-weight: 800;
    cursor: pointer;
    padding: 6px;
  }

  .point-tooltip-heure {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .point-tooltip-valeur {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink);
  }

  .point-tooltip-badge {
    display: inline-block;
    margin-top: 0.35rem;
    font-size: 0.68rem;
    font-weight: 800;
    padding: 0.14rem 0.55rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
    color: #fff;
  }

  @media (min-width: 420px) {
    .cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="deco-sun"></div>
  <div class="kicker">Lyon · Piscines d'été</div>
  <h1>Fréquentation en direct</h1>
  <p>CNTB · Vaise · Duchère · Mermoz</p>
</header>

<div class="wave-divider" aria-hidden="true">
  <svg viewBox="0 0 400 28" preserveAspectRatio="none">
    <path d="M0,14 C25,0 25,28 50,14 C75,0 75,28 100,14 C125,0 125,28 150,14 C175,0 175,28 200,14 C225,0 225,28 250,14 C275,0 275,28 300,14 C325,0 325,28 350,14 C375,0 375,28 400,14"
          fill="none" stroke="#12213b" stroke-width="2" opacity="0.16"/>
  </svg>
</div>

<main>
  <div class="featured" id="featured">
    <h2 id="featured-nom">Centre Nautique T.Bertrand (CNTB)</h2>

    <div class="nombre" id="featured-nombre">—</div>
    <div class="nombre-label" id="featured-nombre-label">chargement…</div>

    <div class="courbe-wrap" id="featured-courbe-wrap" hidden>
      <div id="featured-courbe"></div>
      <div class="courbe-legende">
        <span class="legende-item"><span class="legende-trait"></span> Aujourd'hui</span>
        <span class="legende-item"><span class="legende-trait legende-trait--moyenne"></span> Moyenne</span>
        <span class="legende-item">
          <span class="legende-trait legende-trait--max"></span> Max aujourd'hui (<span id="featured-courbe-max"></span>)
        </span>
      </div>
    </div>
  </div>

  <section class="autres">
    <h3>Autres piscines</h3>
    <div class="cards" id="cards"></div>
  </section>

  <div class="erreur" id="erreur" hidden></div>

  <footer class="maj">
    <span class="live-dot"></span>
    <span id="maj-texte">Mise à jour…</span>
  </footer>
</main>

<div class="point-tooltip" id="point-tooltip" role="tooltip" hidden>
  <button class="point-tooltip-close" id="point-tooltip-close" aria-label="Fermer">×</button>
  <div class="point-tooltip-heure" id="point-tooltip-heure"></div>
  <div class="point-tooltip-valeur" id="point-tooltip-valeur"></div>
  <span class="point-tooltip-badge" id="point-tooltip-badge"></span>
</div>

<script>
(function () {
  var FEATURED_KEY = "CNTB";

  var els = {
    featuredNom: document.getElementById("featured-nom"),
    featuredNombre: document.getElementById("featured-nombre"),
    featuredNombreLabel: document.getElementById("featured-nombre-label"),
    featuredCourbeWrap: document.getElementById("featured-courbe-wrap"),
    featuredCourbe: document.getElementById("featured-courbe"),
    featuredCourbeMax: document.getElementById("featured-courbe-max"),
    cards: document.getElementById("cards"),
    majTexte: document.getElementById("maj-texte"),
    erreur: document.getElementById("erreur"),
    pointTooltip: document.getElementById("point-tooltip"),
    pointTooltipHeure: document.getElementById("point-tooltip-heure"),
    pointTooltipValeur: document.getElementById("point-tooltip-valeur"),
    pointTooltipBadge: document.getElementById("point-tooltip-badge"),
    pointTooltipClose: document.getElementById("point-tooltip-close"),
  };

  var derniereMaj = null;

  // Seuils en nombre de personnes réel, calculés sur les terciles (p33/p66) de
  // la fréquentation réelle observée sur les 12 premiers jours de collecte
  // (909 relevés) : chaque zone vert/orange/rouge couvre ~1/3 des observations
  // réelles. Vaise n'a jamais ouvert — seuils extrapolés du ratio ~10 %/20 %
  // de la capacité légale observé sur les 3 autres piscines, à corriger dès
  // qu'elle ouvrira.
  var SEUILS = {
    CNTB: { vert: 200, rouge: 400 },
    Vaise: { vert: 110, rouge: 220 },
    "Duchère": { vert: 45, rouge: 85 },
    Mermoz: { vert: 50, rouge: 110 },
  };

  function seuilsPiscine(cle) {
    return SEUILS[cle] || { vert: 50, rouge: 100 };
  }

  function niveau(cle, frequentation) {
    var s = seuilsPiscine(cle);
    if (frequentation < s.vert) return "vert";
    if (frequentation <= s.rouge) return "orange";
    return "rouge";
  }

  function couleurNiveau(n) {
    return { vert: "#2f8f5b", orange: "#d97a34", rouge: "#c74634" }[n];
  }

  function pourcentageAffiche(cle, frequentation) {
    var s = seuilsPiscine(cle);
    return Math.min(100, Math.max(0, Math.round((frequentation / s.rouge) * 100)));
  }

  function minutesDepuisMinuit(heure) {
    var parts = heure.split(":");
    return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
  }

  function aujourdhuiLyon() {
    // Format en-CA -> "YYYY-MM-DD", directement comparable au champ "jour".
    return new Date().toLocaleDateString("en-CA", { timeZone: "Europe/Paris" });
  }

  function arrondiJoli(valeur) {
    if (valeur <= 0) return 1;
    var magnitude = Math.pow(10, Math.floor(Math.log10(valeur)));
    var normalise = valeur / magnitude;
    var nice = normalise <= 1 ? 1 : normalise <= 2 ? 2 : normalise <= 5 ? 5 : 10;
    return nice * magnitude;
  }

  function choisirIntervalleMinutes(dureeMinutes, largeurTracee) {
    var maxTicks = Math.max(2, Math.floor(largeurTracee / 46));
    var paliers = [15, 30, 60, 120, 180, 240, 360];
    for (var i = 0; i < paliers.length; i++) {
      if (dureeMinutes / paliers[i] <= maxTicks) return paliers[i];
    }
    return paliers[paliers.length - 1];
  }

  function formatHeureAxe(minutes) {
    var h = Math.floor(minutes / 60);
    var m = minutes % 60;
    return m === 0 ? (h + "h") : (h + "h" + (m < 10 ? "0" : "") + m);
  }

  // Échelle horaire fixe : pas besoin d'afficher la nuit, la piscine est de
  // toute façon toujours fermée en dehors de cette plage.
  var FENETRE_AXE_DEBUT = 7 * 60;
  var FENETRE_AXE_FIN = 20 * 60;

  function creerCourbeJour(pointsJour, moyenneJour, cle, largeur, hauteur) {
    var t0 = FENETRE_AXE_DEBUT;
    var t1 = FENETRE_AXE_FIN;
    var duree = t1 - t0;

    var valides = (pointsJour || []).filter(function (pt) {
      if (pt.ouvert === false || pt.frequentation_reelle == null) return false;
      var m = minutesDepuisMinuit(pt.heure);
      return m >= t0 && m <= t1;
    });

    var moyenneFiltree = (moyenneJour || []).filter(function (pt) {
      var m = minutesDepuisMinuit(pt.heure);
      return m >= t0 && m <= t1;
    });

    if (valides.length < 2 && moyenneFiltree.length < 2) return null;

    var maxJour = valides.length ? Math.max.apply(null, valides.map(function (pt) { return pt.frequentation_reelle; })) : null;
    var maxMoyenne = moyenneFiltree.length
      ? Math.max.apply(null, moyenneFiltree.map(function (pt) { return pt.frequentation_moyenne; }))
      : 0;
    var plafond = arrondiJoli(Math.max(1, (maxJour || 0), maxMoyenne) * 1.15);

    var margeGauche = 30;
    var margeDroite = 6;
    var margeHaut = 8;
    var margeBas = 16;
    var largeurTracee = largeur - margeGauche - margeDroite;
    var hauteurTracee = hauteur - margeHaut - margeBas;

    function y(valeur) {
      return margeHaut + (1 - valeur / plafond) * hauteurTracee;
    }
    function x(minutes) {
      return margeGauche + ((minutes - t0) / duree) * largeurTracee;
    }

    var points = pointsJour.map(function (pt) {
      if (pt.ouvert === false || pt.frequentation_reelle == null) return null;
      var m = minutesDepuisMinuit(pt.heure);
      if (m < t0 || m > t1) return null;
      return { x: x(m), y: y(pt.frequentation_reelle), heure: pt.heure, freq: pt.frequentation_reelle };
    });

    var segments = [];
    var courant = [];
    points.forEach(function (p) {
      if (p) {
        courant.push(p);
      } else if (courant.length) {
        segments.push(courant);
        courant = [];
      }
    });
    if (courant.length) segments.push(courant);

    var svg = '<svg viewBox="0 0 ' + largeur + ' ' + hauteur + '" class="courbe">';

    // Zones grisées : portions de l'axe temporel où la piscine est fermée
    // (avant/après les segments ouverts, ou entre deux segments).
    var curseur = margeGauche;
    var xDroite = largeur - margeDroite;
    segments.forEach(function (segment) {
      var debut = segment[0].x;
      var fin = segment[segment.length - 1].x;
      if (debut > curseur + 0.5) {
        svg += '<rect x="' + curseur.toFixed(1) + '" y="' + margeHaut + '" width="' + (debut - curseur).toFixed(1) +
          '" height="' + hauteurTracee + '" fill="rgba(18,33,59,0.05)"/>';
      }
      curseur = Math.max(curseur, fin);
    });
    if (curseur < xDroite - 0.5) {
      svg += '<rect x="' + curseur.toFixed(1) + '" y="' + margeHaut + '" width="' + (xDroite - curseur).toFixed(1) +
        '" height="' + hauteurTracee + '" fill="rgba(18,33,59,0.05)"/>';
    }

    // Quadrillage + graduations verticales (Y : fréquentation).
    for (var niveau = 0; niveau <= 4; niveau++) {
      var valeurTick = (plafond * niveau) / 4;
      var yTick = y(valeurTick);
      svg += '<line x1="' + margeGauche + '" y1="' + yTick.toFixed(1) + '" x2="' + xDroite +
        '" y2="' + yTick.toFixed(1) + '" stroke="rgba(18,33,59,0.08)" stroke-width="1"/>';
      svg += '<text class="axe-label" x="' + (margeGauche - 5) + '" y="' + (yTick + 2.8).toFixed(1) +
        '" text-anchor="end">' + Math.round(valeurTick) + "</text>";
    }

    // Quadrillage + graduations horizontales (X : heure).
    var intervalle = choisirIntervalleMinutes(duree, largeurTracee);
    var premierTick = Math.ceil(t0 / intervalle) * intervalle;
    for (var m2 = premierTick; m2 <= t1; m2 += intervalle) {
      var xTick = x(m2);
      svg += '<line x1="' + xTick.toFixed(1) + '" y1="' + margeHaut + '" x2="' + xTick.toFixed(1) +
        '" y2="' + (margeHaut + hauteurTracee) + '" stroke="rgba(18,33,59,0.08)" stroke-width="1"/>';
      svg += '<text class="axe-label" x="' + xTick.toFixed(1) + '" y="' + (hauteur - 3) +
        '" text-anchor="middle">' + formatHeureAxe(m2) + "</text>";
    }

    // Courbe de fréquentation moyenne (profil historique au même horaire).
    if (moyenneFiltree.length >= 2) {
      var dMoyenne = moyenneFiltree
        .map(function (pt, i) {
          var px = x(minutesDepuisMinuit(pt.heure));
          var py = y(pt.frequentation_moyenne);
          return (i === 0 ? "M" : "L") + px.toFixed(1) + "," + py.toFixed(1);
        })
        .join(" ");
      svg += '<path d="' + dMoyenne + '" fill="none" stroke="#eab13a" stroke-width="1.75" ' +
        'stroke-linecap="round" stroke-linejoin="round"/>';
    }

    // Trait de référence : maximum observé sur la journée en cours.
    if (maxJour != null) {
      svg += '<line x1="' + margeGauche + '" y1="' + y(maxJour).toFixed(1) + '" x2="' + xDroite +
        '" y2="' + y(maxJour).toFixed(1) + '" stroke="#8891a3" stroke-width="1.5" stroke-dasharray="4,3"/>';
    }

    segments.forEach(function (segment) {
      var d = segment
        .map(function (p, i) { return (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1); })
        .join(" ");
      svg += '<path d="' + d + '" fill="none" stroke="#1f6fb2" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round"/>';
    });

    // Cibles invisibles (pas de point visible) pour l'infobulle au survol/tap.
    points.forEach(function (p) {
      if (!p) return;
      svg += '<circle class="point-hit" data-heure="' + p.heure + '" data-freq="' + p.freq + '" data-cle="' + cle +
        '" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="9" fill="transparent"/>';
    });

    svg += "</svg>";
    return { svg: svg, max: maxJour };
  }

  function formatMinutes(dateIso) {
    if (!dateIso) return "";
    var diffMs = Date.now() - new Date(dateIso).getTime();
    var minutes = Math.max(0, Math.round(diffMs / 60000));
    if (minutes < 1) return "à l'instant";
    if (minutes === 1) return "il y a 1 min";
    if (minutes < 60) return "il y a " + minutes + " min";
    var heures = Math.floor(minutes / 60);
    var reste = minutes % 60;
    return "il y a " + heures + "h" + (reste ? reste : "");
  }

  function formatHeureLyon(dateIso) {
    if (!dateIso) return "";
    return new Date(dateIso).toLocaleTimeString("fr-FR", {
      timeZone: "Europe/Paris",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  function majHorodatage() {
    if (derniereMaj) {
      els.majTexte.textContent = "Mis à jour à " + formatHeureLyon(derniereMaj) +
        " (" + formatMinutes(derniereMaj) + ")";
    }
  }

  function ouvrirTooltip(cible, clientX, clientY) {
    var heure = cible.getAttribute("data-heure");
    var freq = parseInt(cible.getAttribute("data-freq"), 10);
    var cle = cible.getAttribute("data-cle");
    var n = niveau(cle, freq);
    var pct = pourcentageAffiche(cle, freq);

    els.pointTooltipHeure.textContent = heure;
    els.pointTooltipValeur.textContent = freq + " personnes";
    els.pointTooltipBadge.textContent = pct + "%";
    els.pointTooltipBadge.style.background = couleurNiveau(n);
    els.pointTooltip.hidden = false;

    var largeurTooltip = els.pointTooltip.offsetWidth || 140;
    var hauteurTooltip = els.pointTooltip.offsetHeight || 60;
    var x = Math.min(Math.max(8, clientX - largeurTooltip / 2), window.innerWidth - largeurTooltip - 8);
    var y = clientY - hauteurTooltip - 18;
    if (y < 8) y = clientY + 18;
    els.pointTooltip.style.left = x + "px";
    els.pointTooltip.style.top = y + "px";
  }

  function fermerTooltip() {
    els.pointTooltip.hidden = true;
  }

  function estPointHit(cible) {
    return !!(cible && cible.classList && cible.classList.contains("point-hit"));
  }

  document.addEventListener("mouseover", function (e) {
    if (estPointHit(e.target)) ouvrirTooltip(e.target, e.clientX, e.clientY);
  });
  document.addEventListener("mouseout", function (e) {
    if (estPointHit(e.target)) fermerTooltip();
  });
  document.addEventListener("click", function (e) {
    if (estPointHit(e.target)) {
      ouvrirTooltip(e.target, e.clientX, e.clientY);
      return;
    }
    fermerTooltip();
  });
  els.pointTooltipClose.addEventListener("click", function (e) {
    e.stopPropagation();
    fermerTooltip();
  });

  function renderCourbe(conteneur, maxEl, wrapEl, piscine, cle, largeur, hauteur) {
    var tendance = piscine ? piscine.tendance : null;
    var aujourdhui = aujourdhuiLyon();
    var pointsJour = tendance
      ? tendance.filter(function (pt) { return pt.jour === aujourdhui; })
      : [];
    var resultat = creerCourbeJour(pointsJour, piscine ? piscine.moyenne_jour : null, cle, largeur, hauteur);

    if (resultat) {
      conteneur.innerHTML = resultat.svg;
      maxEl.textContent = resultat.max != null ? resultat.max : "—";
      wrapEl.hidden = false;
    } else {
      wrapEl.hidden = true;
    }
  }

  function renderFeatured(piscine) {
    els.featuredNom.textContent = piscine ? piscine.nom : "Centre Nautique T.Bertrand (CNTB)";

    if (!piscine || !piscine.ouvert || piscine.frequentation_reelle == null) {
      els.featuredNombre.textContent = "—";
      els.featuredNombre.style.color = "var(--ink-faint)";
      els.featuredNombreLabel.textContent = "Fermée pour le moment";
    } else {
      var n = niveau(FEATURED_KEY, piscine.frequentation_reelle);
      els.featuredNombre.textContent = piscine.frequentation_reelle;
      els.featuredNombre.style.color = couleurNiveau(n);
      els.featuredNombreLabel.textContent = "personnes actuellement";
    }

    renderCourbe(els.featuredCourbe, els.featuredCourbeMax, els.featuredCourbeWrap, piscine, FEATURED_KEY, 320, 150);
  }

  function renderCard(cle, piscine) {
    var div = document.createElement("div");
    div.className = "card";

    var nom = document.createElement("div");
    nom.className = "nom";
    nom.textContent = piscine ? piscine.nom : cle;
    div.appendChild(nom);

    var nombre = document.createElement("div");
    nombre.className = "nombre-carte";

    if (!piscine || !piscine.ouvert || piscine.frequentation_reelle == null) {
      nombre.textContent = "Fermée";
      nombre.style.color = "var(--ink-faint)";
    } else {
      var n = niveau(cle, piscine.frequentation_reelle);
      var valeur = document.createElement("span");
      valeur.textContent = piscine.frequentation_reelle;
      var unite = document.createElement("span");
      unite.className = "nombre-carte-unite";
      unite.textContent = "personnes";
      nombre.appendChild(valeur);
      nombre.appendChild(document.createTextNode(" "));
      nombre.appendChild(unite);
      nombre.style.color = couleurNiveau(n);
    }
    div.appendChild(nombre);

    var courbeWrap = document.createElement("div");
    courbeWrap.className = "courbe-wrap";
    var courbeDiv = document.createElement("div");
    courbeWrap.appendChild(courbeDiv);

    var legende = document.createElement("div");
    legende.className = "courbe-legende";

    var legendeFreq = document.createElement("span");
    legendeFreq.className = "legende-item";
    var traitFreq = document.createElement("span");
    traitFreq.className = "legende-trait";
    legendeFreq.appendChild(traitFreq);
    legendeFreq.appendChild(document.createTextNode(" Aujourd'hui"));

    var legendeMoyenne = document.createElement("span");
    legendeMoyenne.className = "legende-item";
    var traitMoyenne = document.createElement("span");
    traitMoyenne.className = "legende-trait legende-trait--moyenne";
    legendeMoyenne.appendChild(traitMoyenne);
    legendeMoyenne.appendChild(document.createTextNode(" Moyenne"));

    var legendeMax = document.createElement("span");
    legendeMax.className = "legende-item";
    var traitMax = document.createElement("span");
    traitMax.className = "legende-trait legende-trait--max";
    var maxValeur = document.createElement("span");
    legendeMax.appendChild(traitMax);
    legendeMax.appendChild(document.createTextNode(" Max ("));
    legendeMax.appendChild(maxValeur);
    legendeMax.appendChild(document.createTextNode(")"));

    legende.appendChild(legendeFreq);
    legende.appendChild(legendeMoyenne);
    legende.appendChild(legendeMax);
    courbeWrap.appendChild(legende);

    div.appendChild(courbeWrap);

    renderCourbe(courbeDiv, maxValeur, courbeWrap, piscine, cle, 230, 120);

    return div;
  }

  function render(data) {
    var piscines = data.piscines || {};
    derniereMaj = data.derniere_mise_a_jour;

    renderFeatured(piscines[FEATURED_KEY]);

    els.cards.innerHTML = "";
    Object.keys(piscines)
      .filter(function (cle) { return cle !== FEATURED_KEY; })
      .forEach(function (cle) {
        els.cards.appendChild(renderCard(cle, piscines[cle]));
      });

    majHorodatage();
    els.erreur.hidden = true;
  }

  function charger() {
    fetch("data.json", { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(render)
      .catch(function (err) {
        els.erreur.hidden = false;
        els.erreur.textContent = "Impossible de charger les données (" + err.message + ").";
      });
  }

  charger();
  setInterval(charger, 5 * 60 * 1000);
  setInterval(majHorodatage, 30 * 1000);

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>

</body>
</html>
