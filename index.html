<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Piscines Lyon — Fréquentation en direct</title>
<meta name="description" content="Fréquentation en temps réel des piscines d'été de Lyon : CNTB, Vaise, Duchère, Mermoz.">
<meta name="theme-color" content="#1f6fb2">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #f5efe1;
    --ink: #12213b;
    --ink-soft: #55607a;
    --ink-faint: #8891a3;
    --card-bg: #ffffff;
    --pool: #1f6fb2;
    --sun: #eab13a;
    --vert: #2f8f5b;
    --orange: #d97a34;
    --rouge: #c74634;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 2rem;
  }

  header {
    position: relative;
    padding: 2.1rem 1.25rem 1.1rem;
    text-align: center;
    overflow: hidden;
  }

  .deco-sun {
    position: absolute;
    top: -70px;
    right: -60px;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: var(--sun);
    z-index: 0;
  }

  header .kicker,
  header h1,
  header p {
    position: relative;
    z-index: 1;
  }

  .kicker {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--pool);
    font-weight: 800;
  }

  header h1 {
    margin: 0.4rem 0 0;
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  header p {
    margin: 0.45rem 0 0;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .wave-divider {
    display: block;
    width: 100%;
    height: 18px;
    margin-bottom: 0.5rem;
  }

  .wave-divider svg { display: block; width: 100%; height: 100%; }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 1rem;
  }

  .featured {
    background: var(--card-bg);
    border: 2.5px solid var(--ink);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.25rem 1.5rem;
    box-shadow: 7px 7px 0 var(--ink);
    text-align: center;
  }

  .featured h2 {
    margin: 0 0 0.5rem;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .nombre {
    font-size: 3.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .nombre-label {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin-top: 0.4rem;
    margin-bottom: 1.35rem;
  }

  .courbe-wrap {
    width: 100%;
    text-align: left;
  }

  .courbe {
    display: block;
    width: 100%;
  }

  .point-hit { cursor: pointer; }

  .courbe-axes {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--ink-faint);
    font-weight: 700;
    margin-top: 0.3rem;
  }

  section.autres {
    margin-top: 1.75rem;
  }

  section.autres h3 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 800;
    margin: 0 0 0.7rem 0.25rem;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.85rem;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: var(--radius-md);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .card:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .card .nom {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--ink);
  }

  .card .nombre-carte {
    font-size: 1.7rem;
    font-weight: 800;
    line-height: 1;
  }

  .card .nombre-carte-unite {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--ink-soft);
    margin-left: 0.3rem;
  }

  footer.maj {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    text-align: center;
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--vert);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; }
  }

  .erreur {
    text-align: center;
    color: var(--rouge);
    font-weight: 700;
    font-size: 0.85rem;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: #f7ddd7;
    border: 2px solid var(--rouge);
    border-radius: var(--radius-sm);
  }

  .point-tooltip {
    position: fixed;
    z-index: 50;
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 0.65rem 0.9rem 0.6rem;
    min-width: 136px;
    box-shadow: 4px 4px 0 var(--ink);
  }

  .point-tooltip[hidden] { display: none; }

  .point-tooltip-close {
    position: absolute;
    top: 2px;
    right: 4px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 1rem;
    line-height: 1;
    font-weight: 800;
    cursor: pointer;
    padding: 6px;
  }

  .point-tooltip-heure {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .point-tooltip-valeur {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink);
  }

  .point-tooltip-badge {
    display: inline-block;
    margin-top: 0.35rem;
    font-size: 0.68rem;
    font-weight: 800;
    padding: 0.14rem 0.55rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
    color: #fff;
  }

  @media (min-width: 420px) {
    .cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="deco-sun"></div>
  <div class="kicker">Lyon · Piscines d'été</div>
  <h1>Fréquentation en direct</h1>
  <p>CNTB · Vaise · Duchère · Mermoz</p>
</header>

<div class="wave-divider" aria-hidden="true">
  <svg viewBox="0 0 400 28" preserveAspectRatio="none">
    <path d="M0,14 C25,0 25,28 50,14 C75,0 75,28 100,14 C125,0 125,28 150,14 C175,0 175,28 200,14 C225,0 225,28 250,14 C275,0 275,28 300,14 C325,0 325,28 350,14 C375,0 375,28 400,14"
          fill="none" stroke="#12213b" stroke-width="2" opacity="0.16"/>
  </svg>
</div>

<main>
  <div class="featured" id="featured">
    <h2 id="featured-nom">Centre Nautique T.Bertrand (CNTB)</h2>

    <div class="nombre" id="featured-nombre">—</div>
    <div class="nombre-label" id="featured-nombre-label">chargement…</div>

    <div class="courbe-wrap" id="featured-courbe-wrap" hidden>
      <div id="featured-courbe"></div>
      <div class="courbe-axes">
        <span id="featured-courbe-debut"></span>
        <span id="featured-courbe-fin"></span>
      </div>
    </div>
  </div>

  <section class="autres">
    <h3>Autres piscines</h3>
    <div class="cards" id="cards"></div>
  </section>

  <div class="erreur" id="erreur" hidden></div>

  <footer class="maj">
    <span class="live-dot"></span>
    <span id="maj-texte">Mise à jour…</span>
  </footer>
</main>

<div class="point-tooltip" id="point-tooltip" role="tooltip" hidden>
  <button class="point-tooltip-close" id="point-tooltip-close" aria-label="Fermer">×</button>
  <div class="point-tooltip-heure" id="point-tooltip-heure"></div>
  <div class="point-tooltip-valeur" id="point-tooltip-valeur"></div>
  <span class="point-tooltip-badge" id="point-tooltip-badge"></span>
</div>

<script>
(function () {
  var FEATURED_KEY = "CNTB";

  var els = {
    featuredNom: document.getElementById("featured-nom"),
    featuredNombre: document.getElementById("featured-nombre"),
    featuredNombreLabel: document.getElementById("featured-nombre-label"),
    featuredCourbeWrap: document.getElementById("featured-courbe-wrap"),
    featuredCourbe: document.getElementById("featured-courbe"),
    featuredCourbeDebut: document.getElementById("featured-courbe-debut"),
    featuredCourbeFin: document.getElementById("featured-courbe-fin"),
    cards: document.getElementById("cards"),
    majTexte: document.getElementById("maj-texte"),
    erreur: document.getElementById("erreur"),
    pointTooltip: document.getElementById("point-tooltip"),
    pointTooltipHeure: document.getElementById("point-tooltip-heure"),
    pointTooltipValeur: document.getElementById("point-tooltip-valeur"),
    pointTooltipBadge: document.getElementById("point-tooltip-badge"),
    pointTooltipClose: document.getElementById("point-tooltip-close"),
  };

  var derniereMaj = null;

  // Seuils en nombre de personnes réel (pas en % de la capacité légale, qui est
  // très supérieure à ce qui "sent" plein). Calés sur un seul repère de terrain
  // (CNTB ~860 personnes = déjà bondé) puis extrapolés aux autres piscines au
  // prorata de leur capacité légale — à corriger si le ressenti diffère.
  var SEUILS = {
    CNTB: { vert: 400, rouge: 800 },
    Vaise: { vert: 220, rouge: 440 },
    "Duchère": { vert: 120, rouge: 240 },
    Mermoz: { vert: 100, rouge: 200 },
  };

  function seuilsPiscine(cle) {
    return SEUILS[cle] || { vert: 50, rouge: 100 };
  }

  function niveau(cle, frequentation) {
    var s = seuilsPiscine(cle);
    if (frequentation < s.vert) return "vert";
    if (frequentation <= s.rouge) return "orange";
    return "rouge";
  }

  function couleurNiveau(n) {
    return { vert: "#2f8f5b", orange: "#d97a34", rouge: "#c74634" }[n];
  }

  function pourcentageAffiche(cle, frequentation) {
    var s = seuilsPiscine(cle);
    return Math.min(100, Math.max(0, Math.round((frequentation / s.rouge) * 100)));
  }

  function pourcentagePoint(pt, cle) {
    if (!pt || pt.ouvert === false || pt.frequentation_reelle == null) {
      return null;
    }
    return pourcentageAffiche(cle, pt.frequentation_reelle);
  }

  function minutesDepuisMinuit(heure) {
    var parts = heure.split(":");
    return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
  }

  function minutesAbsolues(pt) {
    var parts = pt.jour.split("-").map(Number);
    var jourIndex = Date.UTC(parts[0], parts[1] - 1, parts[2]) / 86400000;
    return jourIndex * 1440 + minutesDepuisMinuit(pt.heure);
  }

  function formatAxeCourbe(pt) {
    var j = pt.jour.split("-");
    return j[2] + "/" + j[1] + " " + pt.heure;
  }

  function creerCourbe(tendance, cle, largeur, hauteur) {
    if (!tendance || tendance.length < 2) return null;

    var valeurs = tendance.map(function (pt) { return pourcentagePoint(pt, cle); });
    if (!valeurs.some(function (v) { return v != null; })) return null;

    var marge = 8;
    var t0 = minutesAbsolues(tendance[0]);
    var t1 = minutesAbsolues(tendance[tendance.length - 1]);
    var duree = Math.max(1, t1 - t0);

    function y(pourcentage) {
      return marge + (1 - pourcentage / 100) * (hauteur - marge * 2);
    }
    function x(pt) {
      return marge + ((minutesAbsolues(pt) - t0) / duree) * (largeur - marge * 2);
    }

    var points = tendance.map(function (pt, i) {
      var v = valeurs[i];
      if (v == null) return null;
      return {
        x: x(pt), y: y(v), v: v,
        jour: pt.jour, heure: pt.heure,
        freq: pt.frequentation_reelle, cap: pt.capacite_max,
      };
    });

    var segments = [];
    var courant = [];
    points.forEach(function (p) {
      if (p) {
        courant.push(p);
      } else if (courant.length) {
        segments.push(courant);
        courant = [];
      }
    });
    if (courant.length) segments.push(courant);

    var svg = '<svg viewBox="0 0 ' + largeur + ' ' + hauteur + '" class="courbe">';

    // Seule frontière horizontale utile : vert/orange (toujours à 50 % du seuil
    // pratique). La frontière orange/rouge coïncide avec le haut du graphique.
    svg += '<line x1="' + marge + '" y1="' + y(50).toFixed(1) + '" x2="' + (largeur - marge) +
      '" y2="' + y(50).toFixed(1) + '" stroke="rgba(18,33,59,0.14)" stroke-width="1" stroke-dasharray="3,3"/>';

    // Repères verticaux à chaque changement de jour, pour lire les coupures nocturnes.
    var premierJour = Math.floor(t0 / 1440);
    var dernierJour = Math.floor(t1 / 1440);
    for (var j = premierJour + 1; j <= dernierJour; j++) {
      var minuteJour = j * 1440;
      if (minuteJour > t0 && minuteJour < t1) {
        var xj = marge + ((minuteJour - t0) / duree) * (largeur - marge * 2);
        svg += '<line x1="' + xj.toFixed(1) + '" y1="' + marge + '" x2="' + xj.toFixed(1) + '" y2="' + (hauteur - marge) +
          '" stroke="rgba(18,33,59,0.1)" stroke-width="1"/>';
      }
    }

    segments.forEach(function (segment) {
      var d = segment
        .map(function (p, i) { return (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1); })
        .join(" ");
      svg += '<path d="' + d + '" fill="none" stroke="#1f6fb2" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round"/>';
      segment.forEach(function (p) {
        svg += '<circle class="point-visual" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="' +
          couleurNiveau(niveau(cle, p.freq)) + '" stroke="#12213b" stroke-width="1"/>';
        svg += '<circle class="point-hit" data-jour="' + p.jour + '" data-heure="' + p.heure + '" data-freq="' + p.freq +
          '" data-cap="' + p.cap + '" data-pct="' + p.v + '" data-cle="' + cle + '" cx="' + p.x.toFixed(1) + '" cy="' +
          p.y.toFixed(1) + '" r="9" fill="transparent"/>';
      });
    });

    svg += "</svg>";
    return svg;
  }

  function formatMinutes(dateIso) {
    if (!dateIso) return "";
    var diffMs = Date.now() - new Date(dateIso).getTime();
    var minutes = Math.max(0, Math.round(diffMs / 60000));
    if (minutes < 1) return "à l'instant";
    if (minutes === 1) return "il y a 1 min";
    if (minutes < 60) return "il y a " + minutes + " min";
    var heures = Math.floor(minutes / 60);
    var reste = minutes % 60;
    return "il y a " + heures + "h" + (reste ? reste : "");
  }

  function formatHeureLyon(dateIso) {
    if (!dateIso) return "";
    return new Date(dateIso).toLocaleTimeString("fr-FR", {
      timeZone: "Europe/Paris",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  function majHorodatage() {
    if (derniereMaj) {
      els.majTexte.textContent = "Mis à jour à " + formatHeureLyon(derniereMaj) +
        " (" + formatMinutes(derniereMaj) + ")";
    }
  }

  function ouvrirTooltip(cible, clientX, clientY) {
    var jour = cible.getAttribute("data-jour");
    var heure = cible.getAttribute("data-heure");
    var freq = cible.getAttribute("data-freq");
    var cle = cible.getAttribute("data-cle");
    var pct = parseInt(cible.getAttribute("data-pct"), 10);
    var n = niveau(cle, parseInt(freq, 10));

    var j = jour.split("-");
    els.pointTooltipHeure.textContent = j[2] + "/" + j[1] + " " + heure;
    els.pointTooltipValeur.textContent = freq + " personnes";
    els.pointTooltipBadge.textContent = pct + "%";
    els.pointTooltipBadge.style.background = couleurNiveau(n);
    els.pointTooltip.hidden = false;

    var largeurTooltip = els.pointTooltip.offsetWidth || 140;
    var hauteurTooltip = els.pointTooltip.offsetHeight || 60;
    var x = Math.min(Math.max(8, clientX - largeurTooltip / 2), window.innerWidth - largeurTooltip - 8);
    var y = clientY - hauteurTooltip - 18;
    if (y < 8) y = clientY + 18;
    els.pointTooltip.style.left = x + "px";
    els.pointTooltip.style.top = y + "px";
  }

  function fermerTooltip() {
    els.pointTooltip.hidden = true;
  }

  function estPointHit(cible) {
    return !!(cible && cible.classList && cible.classList.contains("point-hit"));
  }

  document.addEventListener("mouseover", function (e) {
    if (estPointHit(e.target)) ouvrirTooltip(e.target, e.clientX, e.clientY);
  });
  document.addEventListener("mouseout", function (e) {
    if (estPointHit(e.target)) fermerTooltip();
  });
  document.addEventListener("click", function (e) {
    if (estPointHit(e.target)) {
      ouvrirTooltip(e.target, e.clientX, e.clientY);
      return;
    }
    fermerTooltip();
  });
  els.pointTooltipClose.addEventListener("click", function (e) {
    e.stopPropagation();
    fermerTooltip();
  });

  function renderCourbe(conteneur, debutEl, finEl, wrapEl, piscine, cle, largeur, hauteur) {
    var tendance = piscine ? piscine.tendance : null;
    var svg = tendance ? creerCourbe(tendance, cle, largeur, hauteur) : null;
    if (svg) {
      conteneur.innerHTML = svg;
      debutEl.textContent = formatAxeCourbe(tendance[0]);
      finEl.textContent = formatAxeCourbe(tendance[tendance.length - 1]);
      wrapEl.hidden = false;
    } else {
      wrapEl.hidden = true;
    }
  }

  function renderFeatured(piscine) {
    els.featuredNom.textContent = piscine ? piscine.nom : "Centre Nautique T.Bertrand (CNTB)";

    if (!piscine || !piscine.ouvert || piscine.frequentation_reelle == null) {
      els.featuredNombre.textContent = "—";
      els.featuredNombre.style.color = "var(--ink-faint)";
      els.featuredNombreLabel.textContent = "Fermée pour le moment";
    } else {
      var n = niveau(FEATURED_KEY, piscine.frequentation_reelle);
      els.featuredNombre.textContent = piscine.frequentation_reelle;
      els.featuredNombre.style.color = couleurNiveau(n);
      els.featuredNombreLabel.textContent = "personnes actuellement";
    }

    renderCourbe(els.featuredCourbe, els.featuredCourbeDebut, els.featuredCourbeFin,
      els.featuredCourbeWrap, piscine, FEATURED_KEY, 300, 130);
  }

  function renderCard(cle, piscine) {
    var div = document.createElement("div");
    div.className = "card";

    var nom = document.createElement("div");
    nom.className = "nom";
    nom.textContent = piscine ? piscine.nom : cle;
    div.appendChild(nom);

    var nombre = document.createElement("div");
    nombre.className = "nombre-carte";

    if (!piscine || !piscine.ouvert || piscine.frequentation_reelle == null) {
      nombre.textContent = "Fermée";
      nombre.style.color = "var(--ink-faint)";
    } else {
      var n = niveau(cle, piscine.frequentation_reelle);
      var valeur = document.createElement("span");
      valeur.textContent = piscine.frequentation_reelle;
      var unite = document.createElement("span");
      unite.className = "nombre-carte-unite";
      unite.textContent = "personnes";
      nombre.appendChild(valeur);
      nombre.appendChild(document.createTextNode(" "));
      nombre.appendChild(unite);
      nombre.style.color = couleurNiveau(n);
    }
    div.appendChild(nombre);

    var courbeWrap = document.createElement("div");
    courbeWrap.className = "courbe-wrap";
    var courbeDiv = document.createElement("div");
    var axes = document.createElement("div");
    axes.className = "courbe-axes";
    var debut = document.createElement("span");
    var fin = document.createElement("span");
    axes.appendChild(debut);
    axes.appendChild(fin);
    courbeWrap.appendChild(courbeDiv);
    courbeWrap.appendChild(axes);
    div.appendChild(courbeWrap);

    renderCourbe(courbeDiv, debut, fin, courbeWrap, piscine, cle, 220, 90);

    return div;
  }

  function render(data) {
    var piscines = data.piscines || {};
    derniereMaj = data.derniere_mise_a_jour;

    renderFeatured(piscines[FEATURED_KEY]);

    els.cards.innerHTML = "";
    Object.keys(piscines)
      .filter(function (cle) { return cle !== FEATURED_KEY; })
      .forEach(function (cle) {
        els.cards.appendChild(renderCard(cle, piscines[cle]));
      });

    majHorodatage();
    els.erreur.hidden = true;
  }

  function charger() {
    fetch("data.json", { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(render)
      .catch(function (err) {
        els.erreur.hidden = false;
        els.erreur.textContent = "Impossible de charger les données (" + err.message + ").";
      });
  }

  charger();
  setInterval(charger, 5 * 60 * 1000);
  setInterval(majHorodatage, 30 * 1000);

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>

</body>
</html>
