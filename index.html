<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Piscines Lyon — Fréquentation en direct</title>
<meta name="description" content="Fréquentation en temps réel des piscines d'été de Lyon : CNTB, Vaise, Duchère, Mermoz.">
<meta name="theme-color" content="#1f6fb2">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #f5efe1;
    --ink: #12213b;
    --ink-soft: #55607a;
    --ink-faint: #8891a3;
    --card-bg: #ffffff;
    --pool: #1f6fb2;
    --sun: #eab13a;
    --vert: #2f8f5b;
    --orange: #d97a34;
    --rouge: #c74634;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 2rem;
  }

  header {
    position: relative;
    padding: 2.1rem 1.25rem 1.1rem;
    text-align: center;
    overflow: hidden;
  }

  .deco-sun {
    position: absolute;
    top: -70px;
    right: -60px;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: var(--sun);
    z-index: 0;
  }

  header .kicker,
  header h1,
  header p {
    position: relative;
    z-index: 1;
  }

  .kicker {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--pool);
    font-weight: 800;
  }

  header h1 {
    margin: 0.4rem 0 0;
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  header p {
    margin: 0.45rem 0 0;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .wave-divider {
    display: block;
    width: 100%;
    height: 18px;
    margin-bottom: 0.5rem;
  }

  .wave-divider svg { display: block; width: 100%; height: 100%; }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 1rem;
  }

  .featured {
    background: var(--card-bg);
    border: 2.5px solid var(--ink);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.25rem 1.5rem;
    box-shadow: 7px 7px 0 var(--ink);
    text-align: center;
  }

  .featured h2 {
    margin: 0 0 1.35rem;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }

  .gauge-wrap {
    position: relative;
    width: 210px;
    height: 210px;
    margin: 0 auto;
  }

  .gauge-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }

  .gauge-track { fill: none; stroke: rgba(18, 33, 59, 0.1); stroke-width: 14; }

  .gauge-value {
    fill: none;
    stroke-width: 14;
    stroke-linecap: round;
    transition: stroke-dasharray 0.6s ease, stroke 0.6s ease;
  }

  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .gauge-percent {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .gauge-sub {
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 0.35rem;
  }

  .verdict {
    display: inline-block;
    margin-top: 1.35rem;
    font-size: 0.92rem;
    font-weight: 800;
    color: #fff;
    padding: 0.5rem 1.05rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
  }

  .verdict-detail {
    margin-top: 0.55rem;
    font-size: 0.82rem;
    color: var(--ink-soft);
  }

  .niveau-vert { background: var(--vert); }
  .niveau-orange { background: var(--orange); }
  .niveau-rouge { background: var(--rouge); }
  .niveau-ferme { background: var(--ink-faint); }

  section.autres {
    margin-top: 1.75rem;
  }

  section.autres h3 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    font-weight: 800;
    margin: 0 0 0.7rem 0.25rem;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.85rem;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: var(--radius-md);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .card:active {
    transform: translate(3px, 3px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .card .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card .nom {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--ink);
  }

  .card .places {
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 0.2rem;
  }

  .card .pastille {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.78rem;
    color: #fff;
    flex-shrink: 0;
  }

  .pastille.vert { background: var(--vert); }
  .pastille.orange { background: var(--orange); }
  .pastille.rouge { background: var(--rouge); }
  .pastille.ferme { background: var(--ink-faint); }

  .sparkline-wrap {
    width: 100%;
  }

  .sparkline-wrap .sparkline-legende {
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 700;
    margin: 0 0 0.3rem;
  }

  .sparkline {
    display: block;
    width: 100%;
  }

  .courbe-jour-wrap {
    width: 100%;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 2px solid var(--ink);
    text-align: left;
  }

  .courbe-jour-legende {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 800;
    margin: 0 0 0.5rem;
  }

  .courbe-jour {
    display: block;
    width: 100%;
  }

  .point-hit { cursor: pointer; }

  .courbe-jour-axes {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--ink-faint);
    font-weight: 700;
    margin-top: 0.2rem;
  }

  footer.maj {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    text-align: center;
    margin-top: 2rem;
    font-size: 0.75rem;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--vert);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; }
  }

  .erreur {
    text-align: center;
    color: var(--rouge);
    font-weight: 700;
    font-size: 0.85rem;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: #f7ddd7;
    border: 2px solid var(--rouge);
    border-radius: var(--radius-sm);
  }

  .point-tooltip {
    position: fixed;
    z-index: 50;
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 0.65rem 0.9rem 0.6rem;
    min-width: 136px;
    box-shadow: 4px 4px 0 var(--ink);
  }

  .point-tooltip[hidden] { display: none; }

  .point-tooltip-close {
    position: absolute;
    top: 2px;
    right: 4px;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 1rem;
    line-height: 1;
    font-weight: 800;
    cursor: pointer;
    padding: 6px;
  }

  .point-tooltip-heure {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .point-tooltip-valeur {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--ink);
  }

  .point-tooltip-badge {
    display: inline-block;
    margin-top: 0.35rem;
    font-size: 0.68rem;
    font-weight: 800;
    padding: 0.14rem 0.55rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
    color: #fff;
  }

  @media (min-width: 420px) {
    .cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="deco-sun"></div>
  <div class="kicker">Lyon · Piscines d'été</div>
  <h1>Fréquentation en direct</h1>
  <p>CNTB · Vaise · Duchère · Mermoz</p>
</header>

<div class="wave-divider" aria-hidden="true">
  <svg viewBox="0 0 400 28" preserveAspectRatio="none">
    <path d="M0,14 C25,0 25,28 50,14 C75,0 75,28 100,14 C125,0 125,28 150,14 C175,0 175,28 200,14 C225,0 225,28 250,14 C275,0 275,28 300,14 C325,0 325,28 350,14 C375,0 375,28 400,14"
          fill="none" stroke="#12213b" stroke-width="2" opacity="0.16"/>
  </svg>
</div>

<main>
  <div class="featured" id="featured">
    <h2 id="featured-nom">Centre Nautique T.Bertrand (CNTB)</h2>

    <div class="gauge-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="gauge-track" cx="100" cy="100" r="85"></circle>
        <circle class="gauge-value" id="gauge-circle" cx="100" cy="100" r="85"
                stroke="#2f8f5b" stroke-dasharray="0 534"></circle>
      </svg>
      <div class="gauge-center">
        <div class="gauge-percent" id="gauge-percent">—</div>
        <div class="gauge-sub" id="gauge-sub">chargement…</div>
      </div>
    </div>

    <div class="verdict" id="verdict">Chargement des données…</div>
    <div class="verdict-detail" id="verdict-detail"></div>

    <div class="courbe-jour-wrap" id="courbe-jour-wrap" hidden>
      <p class="courbe-jour-legende">Aujourd'hui</p>
      <div id="courbe-jour"></div>
      <div class="courbe-jour-axes">
        <span id="courbe-jour-debut"></span>
        <span id="courbe-jour-fin"></span>
      </div>
    </div>

    <div class="sparkline-wrap" id="featured-sparkline-wrap" hidden>
      <p class="sparkline-legende">Même heure, 7 derniers jours</p>
      <div id="featured-sparkline"></div>
    </div>
  </div>

  <section class="autres">
    <h3>Autres piscines</h3>
    <div class="cards" id="cards"></div>
  </section>

  <div class="erreur" id="erreur" hidden></div>

  <footer class="maj">
    <span class="live-dot"></span>
    <span id="maj-texte">Mise à jour…</span>
  </footer>
</main>

<div class="point-tooltip" id="point-tooltip" role="tooltip" hidden>
  <button class="point-tooltip-close" id="point-tooltip-close" aria-label="Fermer">×</button>
  <div class="point-tooltip-heure" id="point-tooltip-heure"></div>
  <div class="point-tooltip-valeur" id="point-tooltip-valeur"></div>
  <span class="point-tooltip-badge" id="point-tooltip-badge"></span>
</div>

<script>
(function () {
  var FEATURED_KEY = "CNTB";

  var els = {
    featuredNom: document.getElementById("featured-nom"),
    gaugeCircle: document.getElementById("gauge-circle"),
    gaugePercent: document.getElementById("gauge-percent"),
    gaugeSub: document.getElementById("gauge-sub"),
    verdict: document.getElementById("verdict"),
    verdictDetail: document.getElementById("verdict-detail"),
    featuredSparklineWrap: document.getElementById("featured-sparkline-wrap"),
    featuredSparkline: document.getElementById("featured-sparkline"),
    courbeJourWrap: document.getElementById("courbe-jour-wrap"),
    courbeJour: document.getElementById("courbe-jour"),
    courbeJourDebut: document.getElementById("courbe-jour-debut"),
    courbeJourFin: document.getElementById("courbe-jour-fin"),
    cards: document.getElementById("cards"),
    majTexte: document.getElementById("maj-texte"),
    erreur: document.getElementById("erreur"),
    pointTooltip: document.getElementById("point-tooltip"),
    pointTooltipHeure: document.getElementById("point-tooltip-heure"),
    pointTooltipValeur: document.getElementById("point-tooltip-valeur"),
    pointTooltipBadge: document.getElementById("point-tooltip-badge"),
    pointTooltipClose: document.getElementById("point-tooltip-close"),
  };

  var CIRCONFERENCE = 2 * Math.PI * 85;
  var derniereMaj = null;

  // Seuils en nombre de personnes réel (pas en % de la capacité légale, qui est
  // très supérieure à ce qui "sent" plein). Calés sur un seul repère de terrain
  // (CNTB ~860 personnes = déjà bondé) puis extrapolés aux autres piscines au
  // prorata de leur capacité légale — à corriger si le ressenti diffère.
  var SEUILS = {
    CNTB: { vert: 400, rouge: 800 },
    Vaise: { vert: 220, rouge: 440 },
    "Duchère": { vert: 120, rouge: 240 },
    Mermoz: { vert: 100, rouge: 200 },
  };

  function seuilsPiscine(cle) {
    return SEUILS[cle] || { vert: 50, rouge: 100 };
  }

  function niveau(cle, frequentation) {
    var s = seuilsPiscine(cle);
    if (frequentation < s.vert) return "vert";
    if (frequentation <= s.rouge) return "orange";
    return "rouge";
  }

  function couleurNiveau(n) {
    return { vert: "#2f8f5b", orange: "#d97a34", rouge: "#c74634" }[n];
  }

  function texteVerdict(n) {
    if (n === "vert") return "C'est calme, profitez-en !";
    if (n === "orange") return "Ça commence à se remplir.";
    return "Très fréquentée, prévoyez de l'attente.";
  }

  function pourcentageAffiche(cle, frequentation) {
    var s = seuilsPiscine(cle);
    return Math.min(100, Math.max(0, Math.round((frequentation / s.rouge) * 100)));
  }

  function pourcentagePoint(pt, cle) {
    if (!pt || pt.ouvert === false || pt.frequentation_reelle == null) {
      return null;
    }
    return pourcentageAffiche(cle, pt.frequentation_reelle);
  }

  function creerSparklineSvg(historique, cle, largeur, hauteur) {
    if (!historique || !historique.length) return null;

    var valeurs = historique.map(function (pt) { return pourcentagePoint(pt, cle); });
    var valides = valeurs.filter(function (v) { return v != null; });
    if (!valides.length) return null;

    var min = Math.min.apply(null, valides);
    var max = Math.max.apply(null, valides);
    if (max - min < 10) {
      var milieu = (max + min) / 2;
      min = Math.max(0, milieu - 5);
      max = Math.min(100, milieu + 5) || 10;
    }

    var marge = 4;
    var n = historique.length;
    var pasX = n > 1 ? (largeur - marge * 2) / (n - 1) : 0;

    var points = valeurs.map(function (v, i) {
      if (v == null) return null;
      var x = marge + i * pasX;
      var y = marge + (1 - (v - min) / (max - min)) * (hauteur - marge * 2);
      return { x: x, y: y, v: v, freq: historique[i].frequentation_reelle };
    });

    var segments = [];
    var courant = [];
    points.forEach(function (p) {
      if (p) {
        courant.push(p);
      } else if (courant.length) {
        segments.push(courant);
        courant = [];
      }
    });
    if (courant.length) segments.push(courant);

    var svg = '<svg viewBox="0 0 ' + largeur + ' ' + hauteur + '" class="sparkline" preserveAspectRatio="none">';
    segments.forEach(function (segment) {
      var d = segment
        .map(function (p, i) { return (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1); })
        .join(" ");
      svg += '<path d="' + d + '" fill="none" stroke="rgba(18,33,59,0.3)" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round"/>';
    });

    var dernier = points[points.length - 1];
    if (dernier) {
      var couleur = couleurNiveau(niveau(cle, dernier.freq));
      svg += '<circle cx="' + dernier.x.toFixed(1) + '" cy="' + dernier.y.toFixed(1) +
        '" r="4" fill="' + couleur + '"/>';
    }

    svg += "</svg>";
    return svg;
  }

  function minutesDepuisMinuit(heure) {
    var parts = heure.split(":");
    return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
  }

  function creerCourbeJournee(journee, cle, largeur, hauteur) {
    if (!journee || journee.length < 2) return null;

    var valeurs = journee.map(function (pt) { return pourcentagePoint(pt, cle); });
    if (!valeurs.some(function (v) { return v != null; })) return null;

    var marge = 8;
    var t0 = minutesDepuisMinuit(journee[0].heure);
    var t1 = minutesDepuisMinuit(journee[journee.length - 1].heure);
    var duree = Math.max(1, t1 - t0);

    function y(pourcentage) {
      return marge + (1 - pourcentage / 100) * (hauteur - marge * 2);
    }

    var points = journee.map(function (pt, i) {
      var v = valeurs[i];
      if (v == null) return null;
      var fraction = (minutesDepuisMinuit(pt.heure) - t0) / duree;
      return {
        x: marge + fraction * (largeur - marge * 2),
        y: y(v),
        v: v,
        heure: pt.heure,
        freq: pt.frequentation_reelle,
        cap: pt.capacite_max,
      };
    });

    var segments = [];
    var courant = [];
    points.forEach(function (p) {
      if (p) {
        courant.push(p);
      } else if (courant.length) {
        segments.push(courant);
        courant = [];
      }
    });
    if (courant.length) segments.push(courant);

    var svg = '<svg viewBox="0 0 ' + largeur + ' ' + hauteur + '" class="courbe-jour">';

    // Seule frontière interne au graphique désormais : vert/orange (toujours à 50 %
    // du seuil pratique). La frontière orange/rouge coïncide avec le haut du graphique.
    svg += '<line x1="' + marge + '" y1="' + y(50).toFixed(1) + '" x2="' + (largeur - marge) +
      '" y2="' + y(50).toFixed(1) + '" stroke="rgba(18,33,59,0.14)" stroke-width="1" stroke-dasharray="3,3"/>';

    segments.forEach(function (segment) {
      var d = segment
        .map(function (p, i) { return (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1); })
        .join(" ");
      svg += '<path d="' + d + '" fill="none" stroke="#1f6fb2" stroke-width="2.5" ' +
        'stroke-linecap="round" stroke-linejoin="round"/>';
      segment.forEach(function (p) {
        svg += '<circle class="point-visual" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3.5" fill="' +
          couleurNiveau(niveau(cle, p.freq)) + '" stroke="#12213b" stroke-width="1"/>';
        svg += '<circle class="point-hit" data-heure="' + p.heure + '" data-freq="' + p.freq + '" data-cap="' + p.cap +
          '" data-pct="' + p.v + '" data-cle="' + cle + '" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) +
          '" r="10" fill="transparent"/>';
      });
    });

    svg += "</svg>";
    return svg;
  }

  function formatMinutes(dateIso) {
    if (!dateIso) return "";
    var diffMs = Date.now() - new Date(dateIso).getTime();
    var minutes = Math.max(0, Math.round(diffMs / 60000));
    if (minutes < 1) return "à l'instant";
    if (minutes === 1) return "il y a 1 min";
    if (minutes < 60) return "il y a " + minutes + " min";
    var heures = Math.floor(minutes / 60);
    var reste = minutes % 60;
    return "il y a " + heures + "h" + (reste ? reste : "");
  }

  function formatHeureLyon(dateIso) {
    if (!dateIso) return "";
    return new Date(dateIso).toLocaleTimeString("fr-FR", {
      timeZone: "Europe/Paris",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  function majHorodatage() {
    if (derniereMaj) {
      els.majTexte.textContent = "Mis à jour à " + formatHeureLyon(derniereMaj) +
        " (" + formatMinutes(derniereMaj) + ")";
    }
  }

  function ouvrirTooltip(cible, clientX, clientY) {
    var heure = cible.getAttribute("data-heure");
    var freq = cible.getAttribute("data-freq");
    var cap = cible.getAttribute("data-cap");
    var cle = cible.getAttribute("data-cle");
    var pct = parseInt(cible.getAttribute("data-pct"), 10);
    var n = niveau(cle, parseInt(freq, 10));

    els.pointTooltipHeure.textContent = heure;
    els.pointTooltipValeur.textContent = freq + " / " + cap + " personnes";
    els.pointTooltipBadge.textContent = pct + "%";
    els.pointTooltipBadge.style.background = couleurNiveau(n);
    els.pointTooltip.hidden = false;

    var largeurTooltip = els.pointTooltip.offsetWidth || 140;
    var hauteurTooltip = els.pointTooltip.offsetHeight || 60;
    var x = Math.min(Math.max(8, clientX - largeurTooltip / 2), window.innerWidth - largeurTooltip - 8);
    var y = clientY - hauteurTooltip - 18;
    if (y < 8) y = clientY + 18;
    els.pointTooltip.style.left = x + "px";
    els.pointTooltip.style.top = y + "px";
  }

  function fermerTooltip() {
    els.pointTooltip.hidden = true;
  }

  els.courbeJour.addEventListener("mouseover", function (e) {
    if (e.target.classList.contains("point-hit")) ouvrirTooltip(e.target, e.clientX, e.clientY);
  });
  els.courbeJour.addEventListener("mouseout", function (e) {
    if (e.target.classList.contains("point-hit")) fermerTooltip();
  });
  els.courbeJour.addEventListener("click", function (e) {
    if (e.target.classList.contains("point-hit")) {
      e.stopPropagation();
      ouvrirTooltip(e.target, e.clientX, e.clientY);
    }
  });
  els.pointTooltipClose.addEventListener("click", function (e) {
    e.stopPropagation();
    fermerTooltip();
  });
  document.addEventListener("click", fermerTooltip);

  function renderFeaturedSparkline(piscine) {
    var svg = piscine ? creerSparklineSvg(piscine.historique_7j, FEATURED_KEY, 260, 44) : null;
    if (svg) {
      els.featuredSparkline.innerHTML = svg;
      els.featuredSparklineWrap.hidden = false;
    } else {
      els.featuredSparklineWrap.hidden = true;
    }
  }

  function renderCourbeJournee(piscine) {
    var journee = piscine ? piscine.journee_actuelle : null;
    var svg = journee ? creerCourbeJournee(journee, FEATURED_KEY, 300, 110) : null;
    if (svg) {
      els.courbeJour.innerHTML = svg;
      els.courbeJourDebut.textContent = journee[0].heure;
      els.courbeJourFin.textContent = journee[journee.length - 1].heure;
      els.courbeJourWrap.hidden = false;
    } else {
      els.courbeJourWrap.hidden = true;
    }
  }

  function renderFeatured(piscine) {
    els.featuredNom.textContent = piscine ? piscine.nom : "Centre Nautique T.Bertrand (CNTB)";

    if (!piscine || !piscine.ouvert || piscine.capacite_max == null || piscine.frequentation_reelle == null) {
      els.gaugeCircle.setAttribute("stroke-dasharray", "0 " + CIRCONFERENCE);
      els.gaugeCircle.setAttribute("stroke", "rgba(18,33,59,0.18)");
      els.gaugePercent.textContent = "—";
      els.gaugePercent.style.color = "var(--ink-faint)";
      els.gaugeSub.textContent = "Fermée";
      els.verdict.textContent = "Piscine fermée pour le moment";
      els.verdict.className = "verdict niveau-ferme";
      els.verdictDetail.textContent = "";
      renderFeaturedSparkline(piscine);
      renderCourbeJournee(piscine);
      return;
    }

    var pourcentage = pourcentageAffiche(FEATURED_KEY, piscine.frequentation_reelle);
    var n = niveau(FEATURED_KEY, piscine.frequentation_reelle);
    var couleur = couleurNiveau(n);

    var longueur = (pourcentage / 100) * CIRCONFERENCE;
    els.gaugeCircle.setAttribute("stroke-dasharray", longueur + " " + CIRCONFERENCE);
    els.gaugeCircle.setAttribute("stroke", couleur);

    els.gaugePercent.textContent = pourcentage + "%";
    els.gaugePercent.style.color = couleur;
    els.gaugeSub.textContent = piscine.frequentation_reelle + " personnes";

    els.verdict.textContent = texteVerdict(n);
    els.verdict.className = "verdict niveau-" + n;
    els.verdictDetail.textContent = "";

    renderFeaturedSparkline(piscine);
    renderCourbeJournee(piscine);
  }

  function renderCard(cle, piscine) {
    var div = document.createElement("div");
    div.className = "card";

    var top = document.createElement("div");
    top.className = "card-top";

    var infos = document.createElement("div");
    var nom = document.createElement("div");
    nom.className = "nom";
    nom.textContent = piscine ? piscine.nom : cle;
    infos.appendChild(nom);

    var places = document.createElement("div");
    places.className = "places";

    var pastille = document.createElement("div");
    pastille.className = "pastille";

    if (!piscine || !piscine.ouvert || piscine.capacite_max == null || piscine.frequentation_reelle == null) {
      places.textContent = "Fermée";
      pastille.classList.add("ferme");
      pastille.textContent = "—";
    } else {
      var pourcentage = pourcentageAffiche(cle, piscine.frequentation_reelle);
      var n = niveau(cle, piscine.frequentation_reelle);
      places.textContent = piscine.frequentation_reelle + " personnes";
      pastille.classList.add(n);
      pastille.textContent = pourcentage + "%";
    }

    infos.appendChild(places);
    top.appendChild(infos);
    top.appendChild(pastille);
    div.appendChild(top);

    var svg = piscine ? creerSparklineSvg(piscine.historique_7j, cle, 220, 28) : null;
    if (svg) {
      var sparklineWrap = document.createElement("div");
      sparklineWrap.className = "sparkline-wrap";
      var legende = document.createElement("p");
      legende.className = "sparkline-legende";
      legende.textContent = "Même heure, 7 derniers jours";
      sparklineWrap.appendChild(legende);
      var sparklineDiv = document.createElement("div");
      sparklineDiv.innerHTML = svg;
      sparklineWrap.appendChild(sparklineDiv);
      div.appendChild(sparklineWrap);
    }

    return div;
  }

  function render(data) {
    var piscines = data.piscines || {};
    derniereMaj = data.derniere_mise_a_jour;

    renderFeatured(piscines[FEATURED_KEY]);

    els.cards.innerHTML = "";
    Object.keys(piscines)
      .filter(function (cle) { return cle !== FEATURED_KEY; })
      .forEach(function (cle) {
        els.cards.appendChild(renderCard(cle, piscines[cle]));
      });

    majHorodatage();
    els.erreur.hidden = true;
  }

  function charger() {
    fetch("data.json", { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(render)
      .catch(function (err) {
        els.erreur.hidden = false;
        els.erreur.textContent = "Impossible de charger les données (" + err.message + ").";
      });
  }

  charger();
  setInterval(charger, 5 * 60 * 1000);
  setInterval(majHorodatage, 30 * 1000);

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>

</body>
</html>
